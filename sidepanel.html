<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sidekick AI</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="logo">✦</span>
      <span class="header-title">Sidekick AI</span>
    </div>
    <div class="header-right">
      <button id="btn-settings" class="btn-icon-only" title="設定 (APIキー)">⚙</button>
      <button id="btn-summarize" class="btn-primary" title="このページを要約">
        <span class="btn-icon">▶</span>
        <span>要約</span>
      </button>
    </div>
  </header>

  <!-- Tab navigation -->
  <nav class="tab-nav">
    <button id="tab-summarize" class="tab tab-active" data-tab="summarize">要約</button>
    <button id="tab-history"   class="tab"            data-tab="history">
      履歴<span id="history-badge" class="history-badge hidden">0</span>
    </button>
  </nav>

  <!-- API Key Warning Banner -->
  <div id="api-key-warning" class="api-warning hidden">
    <span class="warning-icon">⚠</span>
    <span class="warning-text">OpenAI APIキーが未設定です</span>
    <button id="btn-warning-settings" class="btn-warning-link">設定を開く →</button>
  </div>

  <!-- Page info -->
  <div id="page-info" class="page-info hidden">
    <span class="page-favicon" id="page-favicon"></span>
    <div class="page-meta">
      <div class="page-title" id="page-title"></div>
      <div class="page-url" id="page-url"></div>
    </div>
  </div>

  <!-- Main content area -->
  <main id="main">

    <!-- Idle state -->
    <div id="state-idle" class="state-view">
      <div class="idle-content">
        <div class="idle-icon">✦</div>
        <p class="idle-text">技術ドキュメントを開いて<br>「要約」ボタンを押してください</p>
        <ul class="idle-sources">
          <li>GitHub README / Issue / PR</li>
          <li>arXiv 論文</li>
          <li>技術ブログ・ドキュメント</li>
        </ul>
      </div>
    </div>

    <!-- Loading state -->
    <div id="state-loading" class="state-view hidden">
      <div class="loading-content">
        <div class="spinner"></div>
        <p id="loading-text" class="loading-text">コンテンツを取得中...</p>
      </div>
    </div>

    <!-- Error state -->
    <div id="state-error" class="state-view hidden">
      <div class="error-content">
        <div class="error-icon">⚠</div>
        <p id="error-message" class="error-message"></p>
        <div id="error-hint" class="error-hint hidden"></div>
        <button id="btn-goto-settings" class="btn-secondary hidden">⚙ APIキーを設定する</button>
      </div>
    </div>

    <!-- Result state -->
    <div id="state-result" class="state-view hidden">

      <!-- Summary (scrollable, capped height) -->
      <div class="summary-area">
        <div class="result-cards">

          <div class="result-card card-conclusion">
            <div class="card-label">
              <span class="card-icon">◆</span>
              結論
            </div>
            <p id="text-conclusion" class="card-text"></p>
          </div>

          <div class="result-card card-background">
            <div class="card-label">
              <span class="card-icon">◇</span>
              背景
            </div>
            <p id="text-background" class="card-text"></p>
          </div>

          <div class="result-card card-next">
            <div class="card-label">
              <span class="card-icon">▷</span>
              ネクストアクション
            </div>
            <p id="text-next" class="card-text"></p>
          </div>

        </div>

        <!-- Actions -->
        <div class="result-actions">
          <button id="btn-copy" class="btn-secondary" title="クリップボードにコピー">
            <span id="copy-icon">⊕</span> コピー
          </button>
          <button id="btn-retry" class="btn-secondary" title="再要約">
            ↺ 再要約
          </button>
        </div>
      </div>

      <!-- QA Chat section -->
      <div id="qa-section" class="qa-section">
        <div class="qa-section-header">
          <span class="qa-section-label">Q&amp;A</span>
          <span class="qa-section-hint">ページの内容について質問できます</span>
        </div>
        <div id="qa-history" class="qa-history">
          <p class="qa-placeholder">気になったことをそのまま質問してみてください</p>
        </div>
        <div class="qa-input-row">
          <input
            type="text"
            id="qa-input"
            class="qa-input"
            placeholder="例: この実験の具体的な条件は？"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="btn-ask" class="btn-ask" title="送信 (Enter)">↑</button>
        </div>
      </div>

    </div>

    <!-- History view -->
    <div id="state-history" class="history-view hidden">
      <div class="history-toolbar">
        <div class="history-search-bar">
          <span class="history-search-icon">⌕</span>
          <input
            type="text"
            id="history-search"
            class="history-search-input"
            placeholder="タイトル・URL・要約で検索..."
            autocomplete="off"
            spellcheck="false"
          />
          <button id="btn-clear-search" class="btn-clear-search hidden" title="クリア">✕</button>
        </div>
        <button id="btn-clear-all" class="btn-icon-only btn-danger-muted" title="全履歴を削除">🗑</button>
      </div>
      <div id="history-list"  class="history-list"></div>
      <div id="history-empty" class="history-empty hidden">
        <div class="history-empty-icon">📋</div>
        <p  class="history-empty-text">要約した記事が履歴に表示されます</p>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <span>Powered by OpenAI API</span>
  </footer>

  <script src="sidepanel.js"></script>
</body>
</html>
