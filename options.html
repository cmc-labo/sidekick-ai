<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sidekick AI — Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header class="header">
      <span class="logo">✦</span>
      <div>
        <h1 class="title">Sidekick AI</h1>
        <p id="subtitle" class="subtitle">Settings</p>
      </div>
    </header>

    <!-- Form -->
    <main class="form">

      <!-- API Key -->
      <div class="field">
        <label class="label" for="api-key">
          OpenAI API Key
          <span id="label-required" class="label-required">Required</span>
        </label>
        <div class="input-group">
          <input
            type="password"
            id="api-key"
            class="input"
            placeholder="sk-..."
            autocomplete="off"
            spellcheck="false"
          />
          <button id="btn-toggle-key" class="btn-icon-only" title="Show / Hide">👁</button>
        </div>
        <p id="hint-api-key" class="field-hint">
          Stored only in <code>chrome.storage.local</code>. Never sent anywhere except <code>api.openai.com</code>.
        </p>
      </div>

      <!-- Output Language -->
      <div class="field">
        <label id="label-lang" class="label" for="lang">Output Language</label>
        <select id="lang" class="input select">
          <option value="en">English (default)</option>
          <option value="ja">日本語</option>
          <option value="zh">中文（简体）</option>
        </select>
        <p id="hint-lang" class="field-hint">Language for summaries and Q&amp;A answers. Source documents are processed in English.</p>
      </div>

      <!-- Font Size -->
      <div class="field">
        <label id="label-font-size" class="label" for="font-size">Font Size</label>
        <select id="font-size" class="input select">
          <option value="small">Small</option>
          <option value="medium">Medium (default)</option>
          <option value="large">Large</option>
        </select>
      </div>

      <!-- Model -->
      <div class="field">
        <label id="label-model" class="label" for="model">Model</label>
        <select id="model" class="input select">
          <option value="gpt-4.1-nano">gpt-4.1-nano (Fastest, lowest cost)</option>
          <option value="gpt-4.1-mini">gpt-4.1-mini (Fast, balanced)</option>
          <option value="gpt-4o-mini">gpt-4o-mini</option>
          <option value="gpt-4.1">gpt-4.1 (High accuracy)</option>
          <option value="gpt-4o">gpt-4o (High accuracy)</option>
        </select>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button id="btn-save" class="btn-primary">Save</button>
        <button id="btn-test" class="btn-secondary">Test Connection</button>
      </div>

      <!-- Status message -->
      <div id="status" class="status hidden"></div>

    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>
        <span id="footer-hint">Get your API key at </span>
        <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener">
          platform.openai.com/api-keys
        </a>
      </p>
    </footer>

  </div>
  <script src="options.js"></script>
</body>
</html>
