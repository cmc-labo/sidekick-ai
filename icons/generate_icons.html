<!DOCTYPE html>
<!--
  Open this file in Chrome, run the script, then download the generated PNGs.
  Place icon16.png, icon32.png, icon48.png, icon128.png in the icons/ folder.
-->
<html>
<body>
<canvas id="c"></canvas>
<script>
const sizes = [16, 32, 48, 128];
sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#1a1d27');
  grad.addColorStop(1, '#0f1117');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.18);
  ctx.fill();

  // Star / sparkle symbol ✦
  ctx.fillStyle = '#4f8ef7';
  ctx.font = `bold ${size * 0.6}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('✦', size / 2, size / 2);

  const link = document.createElement('a');
  link.download = `icon${size}.png`;
  link.href = canvas.toDataURL('image/png');
  link.textContent = `Download icon${size}.png`;
  link.style.display = 'block';
  document.body.appendChild(link);
});
</script>
</body>
</html>
